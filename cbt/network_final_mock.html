<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>컴퓨터네트워크 기말고사 CBT</title>
  <link rel="stylesheet" href="../assets/style.css">
</head>
<body>
<header class="site-hero"><div class="wrap">
  <h1>컴퓨터네트워크 기말고사 CBT</h1>
  <p class="lead">Chapter 05~11 · 빈칸 · 단답 · 모두 고르기 · 설명형 대비</p>
  <nav class="top-nav"><a href="../index.html">메인</a><a href="../notes/network-final/index.html">요약정리</a><a href="../notes/network-final/compare-summary.html">비교·암기표</a><a href="../review/wrong-notes.html">오답노트</a><a href="../stats/study-record.html">학습기록</a></nav>
  <div class="auth-widget compact" data-auth-widget></div>
</div></header>
<main class="wrap">
  <section id="loginGate" class="notice"></section>
  <div class="layout">
    <aside>
      <section class="card"><h2>필터</h2><label>챕터<select id="chapterFilter"><option value="">전체</option></select></label><label>문제 유형<select id="typeFilter"><option value="">전체</option></select></label><label>카테고리<select id="categoryFilter"><option value="">전체</option></select></label><div class="row" style="margin-top:12px"><button class="btn secondary" id="resetFilters">필터 초기화</button><button class="btn secondary" id="toggleAll">문제 전체 보기</button></div></section>
      <section class="card"><h2>이번 풀이</h2><div class="stat-grid"><div class="stat-box"><b id="statTotal">0</b><br><span class="muted">대상</span></div><div class="stat-box"><b id="statSolved">0</b><br><span class="muted">풀이</span></div><div class="stat-box"><b id="statCorrect">0</b><br><span class="muted">정답</span></div><div class="stat-box"><b id="statRate">0%</b><br><span class="muted">정답률</span></div></div><p id="storageStatus" class="muted"></p></section>
      <section class="card"><h2>문제 번호 이동</h2><select id="jumpSelect"></select><div id="numberGrid" class="question-nav-grid" style="margin-top:10px"></div></section>
    </aside>
    <section>
      <section id="allPanel" class="card" hidden><h2>문제 전체 보기</h2><div id="allList" class="all-list"></div></section>
      <section id="questionCard" class="card"></section>
      <section class="card"><div class="row"><button class="btn secondary" id="prevBtn">이전</button><button class="btn secondary" id="nextBtn">다음</button><button class="btn" id="checkBtn">정답 확인</button><button class="btn warn" id="saveWrongBtn">현재 문제 오답 저장</button><button class="btn secondary" id="retryBtn">화면 답안 초기화</button><a class="btn secondary" href="../review/wrong-notes.html">오답노트</a><a class="btn secondary" href="../stats/study-record.html">학습기록</a></div></section>
    </section>
  </div>
</main>
<script src="../assets/auth.js"></script>
<script src="../assets/storage.js"></script>
<script src="../data/network_final_questions.js"></script>
<script>
(function(){'use strict';
const Auth=window.CNFinalAuth,Store=window.CNFinalStorage,questions=Array.isArray(window.NETWORK_FINAL_QUESTIONS)?window.NETWORK_FINAL_QUESTIONS:[],typeLabels=Store.typeLabels;
let filtered=[],current=0,answers={},sessionResults={},showAll=false;
const $=id=>document.getElementById(id),esc=s=>String(s??'').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m])),norm=s=>String(s??'').trim().toLowerCase(),unique=a=>[...new Set(a.filter(Boolean))].sort((x,y)=>String(x).localeCompare(String(y),'ko'));
const user=()=>Auth.getCurrentUser(),q=()=>filtered[current],persisted=()=>Store.getStudyData().questionStatus||{};
function fillSelect(id,items,labels={}){const sel=$(id),old=sel.value;sel.innerHTML='<option value="">전체</option>'+items.map(x=>`<option value="${esc(x)}">${esc(labels[x]||x)}</option>`).join('');if(items.includes(old))sel.value=old}
function updateCategories(){const ch=$('chapterFilter').value,ty=$('typeFilter').value;fillSelect('categoryFilter',unique(questions.filter(x=>(!ch||x.chapter===ch)&&(!ty||x.type===ty)).map(x=>x.category)))}
function applyFilters(){updateCategories();const ch=$('chapterFilter').value,ty=$('typeFilter').value,cat=$('categoryFilter').value;filtered=questions.filter(x=>(!ch||x.chapter===ch)&&(!ty||x.type===ty)&&(!cat||x.category===cat));current=0;render()}
function init(){fillSelect('chapterFilter',unique(questions.map(x=>x.chapter)));fillSelect('typeFilter',Object.keys(typeLabels),typeLabels);updateCategories();$('chapterFilter').onchange=applyFilters;$('typeFilter').onchange=applyFilters;$('categoryFilter').onchange=applyFilters;$('resetFilters').onclick=()=>{['chapterFilter','typeFilter','categoryFilter'].forEach(id=>$(id).value='');applyFilters()};$('toggleAll').onclick=()=>{showAll=!showAll;$('allPanel').hidden=!showAll;renderAllList()};$('prevBtn').onclick=()=>move(-1);$('nextBtn').onclick=()=>move(1);$('checkBtn').onclick=checkCurrent;$('retryBtn').onclick=()=>{answers={};sessionResults={};render()};$('saveWrongBtn').onclick=saveCurrentWrong;$('jumpSelect').onchange=e=>{saveCurrentAnswer();current=Number(e.target.value)||0;render()}}
function collect(item){if(!item)return null;if(item.type==='multiple-choice'){const el=document.querySelector('input[name="choice"]:checked');return el?Number(el.value):null}if(item.type==='multi-select')return[...document.querySelectorAll('input[name="multi"]:checked')].map(x=>Number(x.value)).sort((a,b)=>a-b);if(item.type==='fill-blank')return[...document.querySelectorAll('[data-blank]')].map(x=>x.value);if(item.type==='short-answer')return $('shortAnswer')?.value||'';if(item.type==='explain')return $('explainAnswer')?.value||'';return null}
function saveCurrentAnswer(){const item=q();if(item)answers[item.id]=collect(item)}
function grade(item,value){if(item.type==='multiple-choice')return value===item.answer;if(item.type==='multi-select'){const a=[...(item.answer||[])].sort((x,y)=>x-y),b=[...(value||[])].sort((x,y)=>x-y);return a.length===b.length&&a.every((x,i)=>x===b[i])}if(item.type==='fill-blank'){const a=Array.isArray(item.answer)?item.answer:[item.answer],b=Array.isArray(value)?value:[value];return a.length===b.length&&a.every((x,i)=>norm(x)===norm(b[i]))}if(item.type==='short-answer')return[item.answer,...(item.acceptedAnswers||[])].some(x=>norm(x)===norm(value));return null}
function keywordStatus(item,value){const text=norm(value);return(item.keywords||[]).map(k=>({keyword:k,hit:text.includes(norm(k))}))}
function answerText(item,value=item.answer){return Store.formatQuestionAnswer(item,value)}function userText(item,value){return Store.formatQuestionAnswer(item,value)}
function record(item,value,correct){const data=Store.recordAnswer({questionId:item.id,chapter:item.chapter,category:item.category,type:item.type,correct,userAnswer:value,answer:item.answer,question:item.question,explanation:item.explanation,source:item.source,time:new Date().toISOString()});$('storageStatus').textContent=`${Auth.getCurrentUser().name}님 기록 저장됨 · 누적 ${data.summary.total}문항`}
function loginGate(){const u=user();$('loginGate').innerHTML=u?`<strong>${esc(u.name)}님 학습 중</strong> · 정답 확인 시 사용자별 오답노트/학습기록에 저장됩니다.`:'<strong>로그인이 필요합니다.</strong> 이 로그인은 보안 인증이 아니라 학습기록 분리용입니다. 상단에서 이름 또는 닉네임을 입력한 뒤 CBT 풀이를 시작하세요.';const dis=!u||!filtered.length;$('checkBtn').disabled=dis;$('saveWrongBtn').disabled=dis}
function choiceClass(item,n,saved,res){if(!res)return'';if(item.type==='multiple-choice'){if(n===item.answer)return'correct';if(saved===n&&n!==item.answer)return'wrong'}if(item.type==='multi-select'){const ans=(item.answer||[]).includes(n),sel=(saved||[]).includes(n);if(ans)return'correct';if(sel&&!ans)return'wrong'}return''}
function inputClass(item,i,value,res){if(!res)return'';if(item.type==='fill-blank'){const ans=(Array.isArray(item.answer)?item.answer:[item.answer])[i];return norm(ans)===norm(value)?'correct':'wrong'}if(item.type==='short-answer')return grade(item,value)?'correct':'wrong';return''}
function renderQuestion(){const box=$('questionCard'),item=q();if(!questions.length){box.innerHTML='<h2>문제 데이터 로딩 실패</h2>';return}if(!item){box.innerHTML='<h2>문제가 없습니다</h2>';return}const res=sessionResults[item.id],saved=answers[item.id]??res?.userAnswer;let input='';if(item.type==='multiple-choice'){input='<div class="choices">'+item.choices.map((c,i)=>{const n=i+1,cls=choiceClass(item,n,saved,res);return`<label class="choice ${cls} ${saved===n?'user-selected':''}"><input data-answer type="radio" name="choice" value="${n}" ${saved===n?'checked':''} ${!user()?'disabled':''}> <span>${n}. ${esc(c)}</span></label>`}).join('')+'</div>'}else if(item.type==='multi-select'){input='<div class="choices">'+item.choices.map((c,i)=>{const n=i+1,cls=choiceClass(item,n,saved||[],res);return`<label class="choice ${cls} ${Array.isArray(saved)&&saved.includes(n)?'user-selected':''}"><input data-answer type="checkbox" name="multi" value="${n}" ${Array.isArray(saved)&&saved.includes(n)?'checked':''} ${!user()?'disabled':''}> <span>${n}. ${esc(c)}</span></label>`}).join('')+'</div>'}else if(item.type==='fill-blank'){const ans=Array.isArray(item.answer)?item.answer:[item.answer];input='<div class="blank-grid">'+ans.map((_,i)=>{const val=(saved||[])[i]||'',cls=inputClass(item,i,val,res);return`<label>${i+1}번 빈칸<input class="answer-input ${cls}" data-answer data-blank="${i}" type="text" value="${esc(val)}" ${!user()?'disabled':''}>${res?`<div class="answer-hint">정답: ${esc(ans[i])}</div>`:''}</label>`}).join('')+'</div>'}else if(item.type==='short-answer'){const val=saved||'',cls=inputClass(item,0,val,res);input=`<label>답안 입력<input class="answer-input ${cls}" data-answer id="shortAnswer" type="text" value="${esc(val)}" ${!user()?'disabled':''}>${res?`<div class="answer-hint">정답: ${esc(answerText(item))}</div>`:''}</label>`}else{input=`<label>설명형 답안 입력<textarea class="answer-input" data-answer id="explainAnswer" ${!user()?'disabled':''} placeholder="핵심 키워드를 포함해 서술하세요.">${esc(saved||'')}</textarea></label>`}box.innerHTML=`<div class="row"><span class="badge">${esc(item.chapter)}</span><span class="badge">${esc(item.category)}</span><span class="badge">${esc(typeLabels[item.type]||item.type)}</span><span class="muted">${current+1} / ${filtered.length}</span></div><h2>${esc(item.id)}</h2><div class="question">${esc(item.question)}</div>${input}<div id="answerPanelMount"></div>`;document.querySelectorAll('[data-answer]').forEach(el=>{el.addEventListener('input',saveCurrentAnswer);el.addEventListener('change',saveCurrentAnswer)});if(res)renderAnswerPanel(item,res)}
function renderAnswerPanel(item,res){const mount=$('answerPanelMount');if(!mount)return;const state=res.correct===true?'correct':res.correct===false?'wrong':'pending',title=res.correct===true?'정답입니다':res.correct===false?'오답입니다':'설명형 키워드 확인',kws=item.type==='explain'?(res.keywords||keywordStatus(item,res.userAnswer)):[];mount.innerHTML=`<section class="answer-panel ${state}"><h3>${title}</h3><p><strong>정답 여부:</strong> ${res.correct===null?'자가 채점 필요':res.correct?'정답':'오답'}</p><p><strong>사용자가 입력한 답:</strong> ${esc(userText(item,res.userAnswer))}</p><p><strong>정답/모범답안:</strong> <span class="model-answer">${esc(answerText(item))}</span></p>${item.type==='explain'?`<p><strong>핵심 키워드:</strong> ${kws.map(k=>`<span class="keyword ${k.hit?'hit':'miss'}">${esc(k.keyword)}</span>`).join('')}</p><div class="row"><button class="btn good" id="markCorrect">정답으로 표시</button><button class="btn bad" id="markWrong">오답으로 표시</button></div>`:''}<div class="explanation-box"><strong>해설</strong><p>${esc(item.explanation)}</p><p class="muted">출처: ${esc(item.source)}</p></div></section>`;if(item.type==='explain'){$('markCorrect').onclick=()=>markExplain(true);$('markWrong').onclick=()=>markExplain(false)}}
function checkCurrent(){const item=q();if(!item||!user()){loginGate();return}const value=collect(item);answers[item.id]=value;if(item.type==='explain'){sessionResults[item.id]={userAnswer:value,correct:null,keywords:keywordStatus(item,value)};render();return}const correct=grade(item,value);sessionResults[item.id]={userAnswer:value,correct};record(item,value,correct);render()}
function markExplain(correct){const item=q();if(!item||!user())return;const value=answers[item.id]??collect(item);sessionResults[item.id]={userAnswer:value,correct,keywords:keywordStatus(item,value)};record(item,value,correct);render()}
function saveCurrentWrong(){const item=q();if(!item||!user()){loginGate();return}const value=collect(item);answers[item.id]=value;sessionResults[item.id]={userAnswer:value,correct:false,keywords:item.type==='explain'?keywordStatus(item,value):undefined};record(item,value,false);render()}
function move(d){if(!filtered.length)return;saveCurrentAnswer();current=Math.min(Math.max(current+d,0),filtered.length-1);render()}
function navStatus(item){const r=sessionResults[item.id];if(r)return r.correct===true?'correct':r.correct===false?'wrong':'unanswered';const s=persisted()[item.id];return s?(s.correct?'correct':'wrong'):'unanswered'}
function renderNav(){const grid=$('numberGrid'),jump=$('jumpSelect');grid.innerHTML='';jump.innerHTML='';filtered.forEach((item,i)=>{const st=navStatus(item),cls=`${st} ${i===current?'current':''}`,b=document.createElement('button');b.className=`question-nav-btn ${cls}`;b.textContent=i+1;b.onclick=()=>{saveCurrentAnswer();current=i;render()};grid.appendChild(b);const opt=document.createElement('option');opt.value=i;opt.textContent=`${i+1}. ${item.id} ${item.chapter}`;if(i===current)opt.selected=true;jump.appendChild(opt)})}
function renderStats(){const vals=Object.values(sessionResults).filter(r=>typeof r.correct==='boolean'),correct=vals.filter(r=>r.correct).length;$('statTotal').textContent=filtered.length;$('statSolved').textContent=vals.length;$('statCorrect').textContent=correct;$('statRate').textContent=vals.length?Math.round(correct/vals.length*100)+'%':'0%'}
function renderAllList(){const list=$('allList');if(!showAll){list.innerHTML='';return}list.innerHTML=filtered.map((item,i)=>{const st=navStatus(item),label=st==='correct'?'정답':st==='wrong'?'오답':'미풀이',cls=st==='correct'?'ok':st==='wrong'?'bad':'wait';return`<button class="list-item" data-i="${i}"><span class="badge ${cls}">${label}</span> <strong>${i+1}. ${esc(item.id)}</strong> <span class="muted">${esc(item.chapter)} · ${esc(typeLabels[item.type])} · ${esc(item.category)}</span><br>${esc(item.question).slice(0,130)}${item.question.length>130?'...':''}</button>`}).join('');list.querySelectorAll('[data-i]').forEach(btn=>btn.onclick=()=>{saveCurrentAnswer();current=Number(btn.dataset.i);render()})}
function render(){loginGate();renderQuestion();renderNav();renderStats();renderAllList();$('prevBtn').disabled=current<=0;$('nextBtn').disabled=current>=filtered.length-1||!filtered.length;loginGate()}
window.addEventListener('cnfinal:userchange',()=>{sessionResults={};render()});if(!questions.length){$('questionCard').innerHTML='<h2>문제 데이터 로딩 실패</h2>';return}init();applyFilters();const targetId=new URLSearchParams(location.search).get('questionId');if(targetId){const idx=filtered.findIndex(x=>x.id===targetId);if(idx>=0){current=idx;render()}}
})();
</script>
</body>
</html>
