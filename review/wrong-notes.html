<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>오답노트 | 컴퓨터네트워크 기말고사</title>
  <link rel="stylesheet" href="../assets/style.css">
</head>
<body>
<header class="site-hero"><div class="wrap">
  <h1>오답노트</h1><p class="lead">현재 로그인한 학습자 기준으로 틀린 문제를 복습합니다.</p>
  <nav class="top-nav"><a href="../index.html">메인</a><a href="../cbt/network_final_mock.html">CBT</a><a href="../stats/study-record.html">학습기록</a><a href="../notes/network-final/index.html">요약정리</a></nav>
  <div class="auth-widget compact" data-auth-widget></div>
</div></header>
<main class="wrap">
  <section id="loginNotice" class="notice"></section>
  <section class="card"><div class="row"><div style="flex:1"><h2>저장된 오답</h2><p class="muted">사용자별 localStorage에 저장됩니다.</p></div><button class="btn bad" id="clearWrong">오답 전체 삭제</button></div></section>
  <section class="card"><div class="row"><label style="flex:1">챕터 필터<select id="chapterFilter"><option value="">전체</option></select></label><label style="flex:1">유형 필터<select id="typeFilter"><option value="">전체</option></select></label></div></section>
  <section id="wrongList" class="list"></section>
</main>
<script src="../assets/auth.js"></script>
<script src="../assets/storage.js"></script>
<script src="../data/network_final_questions.js"></script>
<script>
(function(){const Auth=window.CNFinalAuth,S=window.CNFinalStorage,questions=window.NETWORK_FINAL_QUESTIONS||[],byId=Object.fromEntries(questions.map(q=>[q.id,q]));const $=id=>document.getElementById(id),esc=s=>String(s??'').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m])),unique=a=>[...new Set(a.filter(Boolean))].sort((x,y)=>String(x).localeCompare(String(y),'ko'));function fill(){const notes=S.getWrongNotes();$('chapterFilter').innerHTML='<option value="">전체</option>'+unique(notes.map(x=>x.chapter)).map(x=>`<option>${esc(x)}</option>`).join('');$('typeFilter').innerHTML='<option value="">전체</option>'+unique(notes.map(x=>x.type)).map(x=>`<option value="${esc(x)}">${esc(S.typeLabels[x]||x)}</option>`).join('')}function render(){const user=Auth.getCurrentUser();$('loginNotice').innerHTML=user?`<strong>${esc(user.name)}님 오답노트</strong> · 현재 학습자 기록만 표시합니다.`:'<strong>로그인이 필요합니다.</strong> 상단에서 학습자를 등록하거나 전환하면 해당 학습자의 오답노트를 볼 수 있습니다.';if(!user){$('wrongList').innerHTML='<div class="empty">로그인 후 오답노트를 확인하세요.</div>';return}const ch=$('chapterFilter').value,ty=$('typeFilter').value,list=S.getWrongNotes().filter(x=>(!ch||x.chapter===ch)&&(!ty||x.type===ty));if(!list.length){$('wrongList').innerHTML='<div class="empty">저장된 오답이 없습니다.</div>';return}$('wrongList').innerHTML=list.map(item=>{const q=byId[item.questionId];return`<article class="card"><div class="row"><span class="badge bad">오답</span><span class="badge">${esc(item.chapter)}</span><span class="badge">${esc(S.typeLabels[item.type]||item.type)}</span><span class="muted">${esc(new Date(item.time).toLocaleString('ko-KR'))}</span></div><h2>${esc(item.questionId)}</h2><p><strong>문제:</strong> ${esc(item.question)}</p><p><strong>사용자가 입력한 답:</strong> ${esc(S.formatQuestionAnswer(q,item.userAnswer))}</p><p><strong>정답/모범답안:</strong> ${esc(S.formatQuestionAnswer(q,item.answer))}</p><div class="explanation-box"><strong>해설</strong><p>${esc(item.explanation)}</p></div><div class="row"><a class="btn" href="../cbt/network_final_mock.html?questionId=${encodeURIComponent(item.questionId)}">다시 풀기</a><button class="btn secondary" data-remove="${esc(item.questionId)}">오답노트에서 제거</button></div></article>`}).join('');document.querySelectorAll('[data-remove]').forEach(btn=>btn.onclick=()=>{S.removeWrong(btn.dataset.remove);fill();render()})}$('chapterFilter').onchange=render;$('typeFilter').onchange=render;$('clearWrong').onclick=()=>{if(Auth.getCurrentUser()&&confirm('현재 학습자의 오답노트를 모두 삭제할까요?')){S.clearWrongNotes();fill();render()}};window.addEventListener('cnfinal:userchange',()=>{fill();render()});fill();render()})();
</script>
</body>
</html>
