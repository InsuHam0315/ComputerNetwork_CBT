<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>학습기록 | 컴퓨터네트워크 기말고사</title>
  <link rel="stylesheet" href="../assets/style.css">
</head>
<body>
<header class="site-hero"><div class="wrap">
  <h1>학습기록</h1><p class="lead">전체 풀이 수, 정답률, 챕터별/유형별 성취도를 확인합니다.</p>
  <nav class="top-nav"><a href="../index.html">메인</a><a href="../cbt/network_final_mock.html">CBT</a><a href="../review/wrong-notes.html">오답노트</a><a href="../notes/network-final/index.html">요약정리</a></nav>
</div></header>
<main class="wrap">
  <section class="card"><div class="row"><div style="flex:1"><h2>전체 요약</h2><p class="muted">localStorage 기반으로 이 브라우저에 저장됩니다.</p></div><button class="btn bad" id="clearAll">학습기록 전체 삭제</button></div><div id="summary" class="stat-grid"></div></section>
  <section class="grid"><article class="card"><h2>챕터별 정답률</h2><div id="byChapter"></div></article><article class="card"><h2>문제 유형별 정답률</h2><div id="byType"></div></article></section>
  <section class="card"><h2>최근 풀이 기록</h2><div id="recent"></div></section>
</main>
<script src="../assets/storage.js"></script>
<script>
(function(){
  const S=window.CNFinalStorage; const $=id=>document.getElementById(id); const esc=s=>String(s??'').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));
  function table(obj,labeler=x=>x){const keys=Object.keys(obj||{}).sort((a,b)=>String(a).localeCompare(String(b),'ko')); if(!keys.length)return '<div class="empty">기록 없음</div>'; return '<table><thead><tr><th>구분</th><th>풀이</th><th>정답</th><th>오답</th><th>정답률</th></tr></thead><tbody>'+keys.map(k=>{const v=obj[k];return `<tr><th>${esc(labeler(k))}</th><td>${v.total||0}</td><td>${v.correct||0}</td><td>${v.wrong||0}</td><td>${S.rate(v.correct||0,v.total||0)}%</td></tr>`}).join('')+'</tbody></table>';}
  function render(){const data=S.read(), s=data.summary; $('summary').innerHTML=`<div class="stat-box"><b>${s.total}</b><br>전체 풀이 수</div><div class="stat-box"><b>${s.correct}</b><br>정답 수</div><div class="stat-box"><b>${s.wrong}</b><br>오답 수</div><div class="stat-box"><b>${S.rate(s.correct,s.total)}%</b><br>정답률</div>`; $('byChapter').innerHTML=table(s.byChapter); $('byType').innerHTML=table(s.byType,k=>S.typeLabels[k]||k); const rec=[...data.records].reverse().slice(0,30); $('recent').innerHTML=rec.length?'<table><thead><tr><th>시간</th><th>문항</th><th>챕터</th><th>유형</th><th>결과</th></tr></thead><tbody>'+rec.map(r=>`<tr><td>${esc(new Date(r.time).toLocaleString('ko-KR'))}</td><td>${esc(r.questionId)}</td><td>${esc(r.chapter)}</td><td>${esc(S.typeLabels[r.type]||r.type)}</td><td><span class="badge ${r.correct?'ok':'bad'}">${r.correct?'정답':'오답'}</span></td></tr>`).join('')+'</tbody></table>':'<div class="empty">최근 풀이 기록이 없습니다.</div>';}
  $('clearAll').onclick=()=>{if(confirm('학습기록과 오답노트를 모두 삭제할까요?')){S.clear(); render();}}; render();
})();
</script>
</body>
</html>
