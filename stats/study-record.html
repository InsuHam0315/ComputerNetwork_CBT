<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>학습기록 | 컴퓨터네트워크 기말고사</title>
  <link rel="stylesheet" href="../assets/style.css">
</head>
<body>
<header class="site-hero"><div class="wrap">
  <h1>학습기록</h1><p class="lead">현재 로그인한 학습자 기준으로 정답률과 최근 기록을 확인합니다.</p>
  <nav class="top-nav"><a href="../index.html">메인</a><a href="../cbt/network_final_mock.html">CBT</a><a href="../review/wrong-notes.html">오답노트</a><a href="../notes/network-final/index.html">요약정리</a></nav>
  <div class="auth-widget compact" data-auth-widget></div>
</div></header>
<main class="wrap">
  <section id="loginNotice" class="notice"></section>
  <section class="card"><div class="row"><div style="flex:1"><h2>전체 요약</h2><p class="muted">학습자별 localStorage 기록입니다.</p></div><button class="btn secondary" id="exportJson">JSON 내보내기</button><button class="btn bad" id="clearAll">기록 초기화</button></div><div id="summary" class="stat-grid"></div></section>
  <section class="grid"><article class="card"><h2>챕터별 정답률</h2><div id="byChapter"></div></article><article class="card"><h2>문제 유형별 정답률</h2><div id="byType"></div></article></section>
  <section class="card"><h2>최근 풀이 기록</h2><div id="recent"></div></section>
</main>
<script src="../assets/auth.js"></script>
<script src="../assets/storage.js"></script>
<script>
(function(){const Auth=window.CNFinalAuth,S=window.CNFinalStorage,$=id=>document.getElementById(id),esc=s=>String(s??'').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));function table(obj,labeler=x=>x){const keys=Object.keys(obj||{}).sort((a,b)=>String(a).localeCompare(String(b),'ko'));if(!keys.length)return'<div class="empty">기록 없음</div>';return'<table><thead><tr><th>구분</th><th>풀이</th><th>정답</th><th>오답</th><th>정답률</th></tr></thead><tbody>'+keys.map(k=>{const v=obj[k];return`<tr><th>${esc(labeler(k))}</th><td>${v.total||0}</td><td>${v.correct||0}</td><td>${v.wrong||0}</td><td>${S.rate(v.correct||0,v.total||0)}%</td></tr>`}).join('')+'</tbody></table>'}function render(){const user=Auth.getCurrentUser();$('loginNotice').innerHTML=user?`<strong>${esc(user.name)}님 학습기록</strong> · 현재 학습자 기록만 표시합니다.`:'<strong>로그인이 필요합니다.</strong> 상단에서 학습자를 등록하거나 전환하면 해당 학습자의 기록을 볼 수 있습니다.';if(!user){$('summary').innerHTML='';$('byChapter').innerHTML='<div class="empty">로그인 후 확인하세요.</div>';$('byType').innerHTML='<div class="empty">로그인 후 확인하세요.</div>';$('recent').innerHTML='<div class="empty">로그인 후 확인하세요.</div>';return}const data=S.getStudyData(),s=data.summary;$('summary').innerHTML=`<div class="stat-box"><b>${s.total}</b><br>전체 풀이 수</div><div class="stat-box"><b>${s.correct}</b><br>정답 수</div><div class="stat-box"><b>${s.wrong}</b><br>오답 수</div><div class="stat-box"><b>${S.rate(s.correct,s.total)}%</b><br>정답률</div>`;$('byChapter').innerHTML=table(s.byChapter);$('byType').innerHTML=table(s.byType,k=>S.typeLabels[k]||k);const rec=[...data.records].reverse().slice(0,40);$('recent').innerHTML=rec.length?'<table><thead><tr><th>시간</th><th>문항</th><th>챕터</th><th>유형</th><th>결과</th></tr></thead><tbody>'+rec.map(r=>`<tr><td>${esc(new Date(r.time).toLocaleString('ko-KR'))}</td><td>${esc(r.questionId)}</td><td>${esc(r.chapter)}</td><td>${esc(S.typeLabels[r.type]||r.type)}</td><td><span class="badge ${r.correct?'ok':'bad'}">${r.correct?'정답':'오답'}</span></td></tr>`).join('')+'</tbody></table>':'<div class="empty">최근 풀이 기록이 없습니다.</div>'}$('clearAll').onclick=()=>{if(Auth.getCurrentUser()&&confirm('현재 학습자의 학습기록과 오답노트를 모두 초기화할까요?')){S.clearStudyData();render()}};$('exportJson').onclick=()=>{if(!Auth.getCurrentUser())return;const blob=new Blob([S.exportStudyData()],{type:'application/json'}),a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='computer-network-final-study-data.json';a.click();URL.revokeObjectURL(a.href)};window.addEventListener('cnfinal:userchange',render);render()})();
</script>
</body>
</html>
